<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股产业地图 — 拓扑网络</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0d1117; color: #c9d1d9; overflow: hidden; height: 100vh; }

#app { display: flex; height: 100vh; }

/* 左侧边栏 */
#sidebar { width: 220px; min-width: 220px; background: #161b22; border-right: 1px solid #30363d; padding: 16px; overflow-y: auto; }
#sidebar h2 { font-size: 16px; margin-bottom: 16px; color: #58a6ff; }
.industry-btn { display: block; width: 100%; padding: 10px 14px; margin-bottom: 4px; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; cursor: pointer; text-align: left; font-size: 13px; transition: all 0.2s; }
.industry-btn:hover { background: #30363d; border-color: #58a6ff; }
.industry-btn.active { background: #1f3a5f; border-color: #58a6ff; color: #58a6ff; }
.industry-btn .badge { float: right; background: #21262d; color: #8b949e; font-size: 11px; padding: 1px 8px; border-radius: 10px; }
.industry-info { font-size: 11px; color: #8b949e; margin: 8px 0 12px; padding: 8px 10px; background: #0d1117; border-radius: 4px; line-height: 1.5; }

/* 控制栏 */
#controls { display: flex; align-items: center; gap: 12px; padding: 10px 20px; background: #161b22; border-bottom: 1px solid #30363d; flex-wrap: wrap; }
#controls label { color: #8b949e; font-size: 13px; }
#controls select { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px; padding: 6px 10px; font-size: 13px; }
#controls .refresh-btn { background: #238636; color: white; border: none; border-radius: 4px; padding: 6px 16px; cursor: pointer; font-size: 13px; }
#controls .refresh-btn:hover { background: #2ea043; }
#legend { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #8b949e; }
.legend-color { width: 14px; height: 14px; border-radius: 50%; }

/* 主画布 */
#main { flex: 1; display: flex; flex-direction: column; }
#graph { flex: 1; position: relative; }
#graph svg { width: 100%; height: 100%; }

/* 节点 */
.node circle { stroke: #fff; stroke-width: 1.5px; cursor: pointer; transition: r 0.2s; }
.node circle:hover { stroke: #58a6ff; stroke-width: 3px; }
.node text { font-size: 11px; fill: #c9d1d9; pointer-events: none; }
.node-label { font-size: 10px; fill: #8b949e; }
.link { stroke: #30363d; stroke-width: 1.5px; stroke-opacity: 0.6; }

/* 弹窗 */
.tooltip { position: absolute; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px 18px; font-size: 13px; pointer-events: none; max-width: 280px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 100; }
.tooltip h3 { color: #58a6ff; margin-bottom: 6px; font-size: 15px; }
.tooltip .row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #21262d; }
.tooltip .row:last-child { border-bottom: none; }
.tooltip .label { color: #8b949e; }
.tooltip .value { color: #c9d1d9; font-weight: 500; }
.tooltip .up { color: #3fb950 !important; }
.tooltip .down { color: #f85149 !important; }

/* 环节标签 */
.link-group { pointer-events: none; }
.link-group text { font-size: 11px; fill: #8b949e; text-anchor: middle; }

/* 滚动条 */
#sidebar::-webkit-scrollbar { width: 6px; }
#sidebar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

    <h2>🏭 产业地图</h2>
    <div id="industry-list"></div>
    <div id="industry-desc" class="industry-info"></div>
  </div>
  <div id="main">
    <div id="controls">
      <label>着色指标:</label>
      <select id="color-metric">
        <option value="chg">今日涨幅</option>
        <option value="yearChg">年度涨幅</option>
        <option value="monthChg">月度涨幅</option>
        <option value="volume">成交量</option>
        <option value="amplitude">振幅</option>
      </select>
      <label>环节标签:</label>
      <select id="label-mode">
        <option value="stock">股票名</option>
        <option value="link">环节名</option>
        <option value="both" selected>环节+股票</option>
      </select>
      <button class="refresh-btn" onclick="refreshData()">🔄 刷新数据</button>
      <div style="margin-left:auto;font-size:11px;color:#8b949e" id="update-time"></div>
    </div>
    <div id="graph"><svg></svg></div>

</div>

// ================================================================
// 行情数据获取
// ================================================================
async function fetchPrices() {
  // 收集所有股票代码
  const allCodes = new Set();
  for (const ind of Object.values(INDUSTRY_DATA)) {
    for (const link of Object.values(ind['环节'])) {
      for (const c of link['股票']) allCodes.add(c);
    }
  }
  const codes = [...allCodes];
  
  // 分批次请求腾讯API（每次最多30只）
  const batchSize = 30;
  const results = {};
  
  for (let i = 0; i < codes.length; i += batchSize) {
    const batch = codes.slice(i, i + batchSize);
    const qtCodes = batch.map(c => (c.startsWith('6') ? 'sh' : 'sz') + c);
    try {
      const url = 'https://qt.gtimg.cn/q=' + qtCodes.join(',') + '&_=' + Date.now();
      const resp = await fetch(url);
      const text = await resp.text();
      
      for (const line of text.split(';')) {
        if (!line.trim() || !line.includes('~')) continue;
        const parts = line.split('~');
        const rawCode = parts[0] || '';
        const code = rawCode.replace(/^(sh|sz)/, '');
        const name = parts[1] || '';
        const price = parseFloat(parts[3]) || 0;
        const chg = parseFloat(parts[32]) || 0;
        const yearChg = parseFloat(parts[69]) || 0;
        const volume = parseInt(parts[6]) || 0;  // 成交量（手）
        const high = parseFloat(parts[33]) || 0;
        const low = parseFloat(parts[34]) || 0;
        const amplitude = high && low ? ((high - low) / low * 100) : 0;
        
        results[code] = { price, chg, yearChg, monthChg: chg, volume, amplitude, name };
      }
    } catch (e) {
      console.warn('Batch fetch error:', e);
    }
  }
  
  return results;
}

// ================================================================
// 颜色映射
// ================================================================
function getColor(value, metric) {
  if (value === null || value === undefined) return '#8b949e';
  
  let normalized;
  switch (metric) {
    case 'chg':
    case 'yearChg':
    case 'monthChg':
      // 涨跌幅：-5%以下深红，-3%红，0灰，+3%绿，+5%深绿
      if (value > 5) return '#00c853';
      if (value > 3) return '#2ea043';
      if (value > 1) return '#58a6ff';
      if (value > 0) return '#8b949e';
      if (value > -1) return '#8b949e';
      if (value > -3) return '#f85149';
      if (value > -5) return '#d73a49';
      return '#7d1a2c';
    case 'volume':
      // 成交量（亿）
      const v = value / 10000;
      if (v > 100) return '#00c853';
      if (v > 30) return '#2ea043';
      if (v > 10) return '#58a6ff';
      if (v > 3) return '#8b949e';
      return '#6e7681';
    case 'amplitude':
      if (value > 10) return '#00c853';
      if (value > 5) return '#2ea043';
      if (value > 3) return '#58a6ff';
      if (value > 1) return '#8b949e';
      return '#6e7681';
    default:
      return '#8b949e';
  }
}

// ================================================================
// 构建图数据
// ================================================================
function buildGraphData(industryName, stocks) {
  const industry = INDUSTRY_DATA[industryName];
  if (!industry) return { nodes: [], links: [] };
  
  const links_data = industry['环节'];
  const nodes = [];
  const links = [];
  const nodeMap = {};  // code -> node index
  
  // 为每个环节创建"环节节点" + 股票节点
  let nodeIdx = 0;
  
  for (const [linkName, linkData] of Object.entries(links_data)) {
    // 环节节点
    const linkNode = {
      id: 'link_' + linkName,
      name: linkName,
      type: 'link',
      code: null,
      stocks: linkData['股票'].length,
      barrier: linkData['壁垒'],
      industry: industryName,
      linkDesc: linkData['描述'],
      upstream: linkData['上游'] || [],
      downstream: linkData['下游'] || [],
    };
    nodes.push(linkNode);
    nodeMap[linkNode.id] = nodeIdx;
    nodeIdx++;
    
    // 股票节点
    for (const code of linkData['股票']) {
      const price = stocks[code] || {};
      const yearChg = price.yearChg || 0;
      const stockNode = {
        id: code,
        name: price.name || code,
        code: code,
        type: 'stock',
        price: price.price || 0,
        chg: price.chg || 0,
        yearChg: price.yearChg || 0,
        monthChg: price.monthChg || 0,
        volume: price.volume || 0,
        amplitude: price.amplitude || 0,
        industry: industryName,
        linkName: linkName,
        barrier: linkData['壁垒'],
      };
      nodes.push(stockNode);
      nodeMap[code] = nodeIdx;
      
      // 股票→环节 边
      links.push({ source: code, target: 'link_' + linkName });
      
      nodeIdx++;
    }
  }
  
  // 环节间上下游边
  for (const [linkName, linkData] of Object.entries(links_data)) {
    const targetId = 'link_' + linkName;
    for (const up of (linkData['上游'] || [])) {
      // 找上游环节节点
      for (const [otherName, otherData] of Object.entries(links_data)) {
        if (otherName === up) {
          links.push({ source: 'link_' + otherName, target: targetId });
        }
      }
    }
  }
  
  return { nodes, links };
}

  const svgEl = document.querySelector('#graph svg');
  const width = document.getElementById('graph').clientWidth;
  const height = document.getElementById('graph').clientHeight;

  const data = buildGraphData(industryName, stockPrices);
  if (data.nodes.length === 0) {
    svgEl.innerHTML = '<text x="50%" y="50%" fill="#8b949e" text-anchor="middle" font-size="16">暂无数据</text>';
    return;

  simulation = d3.forceSimulation(data.nodes)
    .force('link', d3.forceLink(data.links).id(d => d.id).distance(80))
    .force('charge', d3.forceManyBody().strength(-250))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide(25));

    const tgt = typeof l.target === 'object' ? l.target : null;
    if (src && tgt && src.type === 'link' && tgt.type === 'link') {
      const key = src.id + '→' + tgt.id;
      linkGroups[key] = { source: src, target: tgt };
    }

    .attr('id', 'arrow')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 28)

    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('fill', '#58a6ff')
    .attr('d', 'M0,-5L10,0L0,5');
  
  // 股票→环节连线 (实线)
  const stockLinks = data.links.filter(l => {
    const src = typeof l.source === 'object' ? l.source : null;
    const tgt = typeof l.target === 'object' ? l.target : null;
    return src && tgt && (src.type === 'stock' || tgt.type === 'stock');
  });
  
  g.selectAll('.stock-link')
    .data(stockLinks)
    .enter().append('line')
    .attr('class', 'stock-link')
    .attr('stroke', '#21262d')
    .attr('stroke-width', 1);
  
  // 节点
  const node = g.selectAll('.node')
    .data(data.nodes)
    .enter().append('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', dragStarted)
      .on('drag', dragged)
      .on('end', dragEnded));
  
  // 环节节点（方块）
  node.filter(d => d.type === 'link')
    .append('rect')
    .attr('width', d => Math.max(70, d.name.length * 14))
    .attr('height', 28)
    .attr('x', d => -Math.max(70, d.name.length * 14) / 2)
    .attr('y', -14)
    .attr('rx', 6)
    .attr('fill', d => {
      if (d.barrier >= 5) return '#1a3a2a';
      if (d.barrier >= 4) return '#1a2a3a';
      if (d.barrier >= 3) return '#2a2a2a';
      return '#21262d';
    })
    .attr('stroke', d => {
      if (d.barrier >= 5) return '#2ea043';
      if (d.barrier >= 4) return '#58a6ff';
      if (d.barrier >= 3) return '#8b949e';
      return '#30363d';
    })
    .attr('stroke-width', 2)
    .style('cursor', 'pointer');
  
  // 环节文字
  node.filter(d => d.type === 'link')
    .append('text')
    .text(d => d.name + (d.stocks > 0 ? ' (' + d.stocks + ')' : ''))
    .attr('text-anchor', 'middle')
    .attr('dy', '0.35em')
    .attr('fill', '#c9d1d9')
    .attr('font-size', '12px');
  
  // 股票节点（圆形）
  node.filter(d => d.type === 'stock')
    .append('circle')
    .attr('r', 18)
    .attr('fill', d => getColor(d[colorMetric] || 0, colorMetric))
    .attr('stroke', d => {
      if (d.chg > 5) return '#00c853';
      if (d.chg > 2) return '#2ea043';
      if (d.chg < -2) return '#f85149';
      if (d.chg < -5) return '#d73a49';
      return '#fff';
    })
    .style('cursor', 'pointer')
    .on('mouseover', showTooltip)
    .on('mousemove', moveTooltip)
    .on('mouseout', hideTooltip)
    .on('click', function(event, d) {
      window.open('https://xueqiu.com/S/SH' + d.code, '_blank');
    });
  
  // 股票文字
  if (labelMode === 'stock' || labelMode === 'both') {
    node.filter(d => d.type === 'stock')
      .append('text')
      .text(d => d.name.length > 4 ? d.name.slice(0, 4) : d.name)
      .attr('text-anchor', 'middle')
      .attr('dy', '3.5em')
      .attr('fill', '#8b949e')
      .attr('font-size', '10px');
  }
  
  if (labelMode === 'link' || labelMode === 'both') {
    node.filter(d => d.type === 'link')
      .select('text')
      .remove();
    
    node.filter(d => d.type === 'link')
      .append('text')
      .text(d => d.name)
      .attr('text-anchor', 'middle')
      .attr('dy', '-1.2em')
      .attr('fill', '#58a6ff')
      .attr('font-size', '12px')
      .attr('font-weight', 'bold');
    
    node.filter(d => d.type === 'link')
      .append('text')
      .text(d => '🔒' + d.barrier + '/5')
      .attr('text-anchor', 'middle')
      .attr('dy', '2em')
      .attr('fill', '#8b949e')
      .attr('font-size', '10px');
  }
  
  // Simulation tick
  simulation.on('tick', () => {
    g.selectAll('.link')
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    
    g.selectAll('.stock-link')
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

// ================================================================
// 拖拽
// ================================================================
function dragStarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}
function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}
function dragEnded(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null;
  d.fy = null;
}

// ================================================================
// Tooltip
// ================================================================
const tooltip = document.createElement('div');
tooltip.className = 'tooltip';
tooltip.style.display = 'none';
document.getElementById('graph').appendChild(tooltip);

function showTooltip(event, d) {
  const chgClass = d.chg >= 0 ? 'up' : 'down';
  tooltip.innerHTML = `
    <h3>${d.name} (${d.code})</h3>
    <div class="row"><span class="label">所属环节</span><span>${d.linkName}</span></div>
    <div class="row"><span class="label">壁垒评分</span><span>${d.barrier}/5</span></div>
    <div class="row"><span class="label">价格</span><span>¥${d.price.toFixed(2)}</span></div>
    <div class="row"><span class="label">今日涨幅</span><span class="${chgClass}">${d.chg >= 0 ? '+' : ''}${d.chg.toFixed(2)}%</span></div>
    <div class="row"><span class="label">成交量</span><span>${(d.volume/10000).toFixed(1)}万手</span></div>
    <div class="row"><span class="label">振幅</span><span>${d.amplitude.toFixed(1)}%</span></div>
    <div style="margin-top:6px;font-size:11px;color:#8b949e">点击跳转雪球</div>
  `;
  tooltip.style.display = 'block';
  moveTooltip(event);
}

function moveTooltip(event) {
  const rect = document.getElementById('graph').getBoundingClientRect();
  let x = event.clientX - rect.left + 15;
  let y = event.clientY - rect.top - 10;
  if (x + 300 > rect.width) x = event.clientX - rect.left - 290;
  if (y + 200 > rect.height) y = rect.height - 210;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

// ================================================================
// 侧边栏
// ================================================================
function buildSidebar() {
  const list = document.getElementById('industry-list');
  list.innerHTML = '';
  
  for (const [name, data] of Object.entries(INDUSTRY_DATA)) {
    const totalStocks = new Set();
    for (const link of Object.values(data['环节'])) {
      for (const c of link['股票']) totalStocks.add(c);
    }
    
    const btn = document.createElement('button');
    btn.className = 'industry-btn' + (name === currentIndustry ? ' active' : '');
    btn.innerHTML = `${name} <span class="badge">${totalStocks.size}</span>`;
    btn.onclick = () => switchIndustry(name);
    list.appendChild(btn);
  }
}

function switchIndustry(name) {
  currentIndustry = name;
  document.querySelectorAll('.industry-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim().startsWith(name));
  });
  
  const desc = INDUSTRY_DATA[name]?.描述 || '';
  document.getElementById('industry-desc').textContent = '📌 ' + desc;
  
  renderGraph(name);
}

// ================================================================
// 刷新数据
// ================================================================
async function refreshData() {
  const btn = document.querySelector('.refresh-btn');
  btn.textContent = '⏳ 加载中...';
  btn.disabled = true;
  
  try {
    stockPrices = await fetchPrices();
    const now = new Date();
    document.getElementById('update-time').textContent = '更新: ' + now.toLocaleTimeString('zh-CN');
    renderGraph(currentIndustry);
  } catch (e) {
    console.error('Refresh failed:', e);
  }
  
  btn.textContent = '🔄 刷新数据';
  btn.disabled = false;
}

// ================================================================
// 控件监听
// ================================================================
document.getElementById('color-metric').addEventListener('change', function() {
  colorMetric = this.value;
  renderGraph(currentIndustry);
});

document.getElementById('label-mode').addEventListener('change', function() {
  labelMode = this.value;
  renderGraph(currentIndustry);
});

// ================================================================
// 初始化
// ================================================================
window.addEventListener('resize', () => renderGraph(currentIndustry));

buildSidebar();
switchIndustry('人形机器人');
refreshData();
</script>
</body>
</html>
